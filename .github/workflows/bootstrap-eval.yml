name: bootstrap-eval
on:
  workflow_dispatch:
    inputs:
      fixture:
        description: "Fixture to evaluate (rust-cli | python-service | ts-monorepo | all)"
        default: all
jobs:
  eval:
    # Manual dispatch only. The L3 evals run a headless `claude` bootstrap — minutes and
    # API spend per fixture — so they are not a per-PR CI gate. The AC-2.3 release gate is
    # satisfied by running them locally, green, before merging the Release PR.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: dtolnay/rust-toolchain@stable
      - run: npm install -g @anthropic-ai/claude-code
      - run: evals/harness/bootstrap-eval.sh "${{ github.event.inputs.fixture || 'all' }}"
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: eval-results
          path: evals/results/
