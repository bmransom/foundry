name: bootstrap-eval
on:
  workflow_dispatch:
    inputs:
      fixture:
        description: "Fixture to evaluate (rust-cli | python-service | ts-monorepo | all)"
        default: all
jobs:
  eval:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install -g @anthropic-ai/claude-code
      - run: evals/harness/bootstrap-eval.sh "${{ github.event.inputs.fixture }}"
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: eval-results
          path: evals/results/
